<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian Artifact Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Global Midnight Tech Base Background */
        body {
            background-color: #090D16 !important;
            color: #E5E7EB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background-color: #111827 !important;
            border-bottom: 1px solid #1F2937;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="{% url 'home' %}">
                <span style="color: #06B6D4;">&#9670;</span> ARTIFACT LIBRARY
            </a>
            {% if user.is_authenticated %}
                <div class="d-flex align-items-center">
                    <span class="navbar-text text-secondary me-3">Welcome, <strong class="text-light">{{ user.username }}</strong></span>
                    <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Log Out</a>
                </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
