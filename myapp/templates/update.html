{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-lg text-white" style="width: 100%; max-width: 500px; border-radius: 12px; background-color: #111827; border: 1px solid #1F2937;">
        <div class="card-header py-3 text-center" style="background-color: #0F172A; border-bottom: 1px solid #1F2937; border-top-left-radius: 12px; border-top-right-radius: 12px;">
            <h4 class="mb-0" style="color: #06B6D4; font-weight: 700;">Modify Vault Record</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label text-secondary-custom small fw-bold text-uppercase">Database System Reference</label>
                    <input type="text" class="form-control" value="#{{ artifact.id }}" readonly style="background-color: #0F172A !important; border: 1px solid #1F2937; color: #06B6D4 !important; font-family: monospace; cursor: not-allowed;">
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary-custom small fw-bold text-uppercase">Artifact Designation</label>
                    <input type="text" name="artifact_name" class="form-control tech-input" value="{{ artifact.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary-custom small fw-bold text-uppercase">Power Value Matrix (10 - 100)</label>
                    <input type="number" name="artifact_power" class="form-control tech-input" value="{{ artifact.power }}" min="10" max="100" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary-custom small fw-bold text-uppercase">Rarity Matrix Override</label>
                    <select name="artifact_rarity" class="form-select tech-input" required style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 16 16%27%3E%3Cpath fill=%27none%27 stroke=%27%239CA3AF%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%272%27 d=%27m2 5 6 6 6-6%27/%3E%3C/svg%3E');">
                        <option value="Common" style="background-color: #111827;" {% if artifact.rarity == "Common" %}selected{% endif %}>Common</option>
                        <option value="Rare" style="background-color: #111827;" {% if artifact.rarity == "Rare" %}selected{% endif %}>Rare</option>
                        <option value="Legendary" style="background-color: #111827;" {% if artifact.rarity == "Legendary" %}selected{% endif %}>Legendary</option>
                        <option value="Mythical" style="background-color: #111827;" {% if artifact.rarity == "Mythical" %}selected{% endif %}>Mythical</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between align-items-end mt-4">
                    <div>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4 text-secondary-custom" style="border-color: #374151;">&larr; Back</a>
                    </div>
                    
                    <div class="d-flex flex-column gap-2" style="width: 200px;">
                        <button type="submit" class="btn tech-btn w-100 py-2">Save Changes</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary w-100 py-2 text-white text-center" style="background-color: #374151; border: none;">Discard Changes</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .tech-input {
        background-color: #1F2937 !important;
        border: 1px solid #374151 !important;
        color: #FFFFFF !important;
    }
    .tech-input:focus {
        border-color: #06B6D4 !important;
        box-shadow: 0 0 0 0.25rem rgba(6, 182, 212, 0.2) !important;
    }
    .text-secondary-custom {
        color: #9CA3AF !important;
    }
    .tech-btn {
        background-color: #06B6D4 !important;
        border: none !important;
        color: #090D16 !important;
        font-weight: 700 !important;
    }
    .tech-btn:hover {
        background-color: #22D3EE !important;
        box-shadow: 0 0 12px rgba(6, 182, 212, 0.4) !important;
        color: #090D16 !important;
    }
</style>
{% endblock %}
